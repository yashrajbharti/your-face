<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your face</title>
    <link rel="icon" type="image/svg+xml" href="face.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: system-ui, -apple-system, sans-serif;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        #pip-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            opacity: 0.6;
        }

        #pip-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            opacity: 1;
        }

        #pip-btn:active {
            transform: scale(0.9);
        }

        #pip-btn svg {
            fill: white;
            width: 20px;
            height: 20px;
            opacity: 0.8;
        }

        #pip-btn:hover svg {
            opacity: 1;
        }
    </style>
</head>

<body id="c">
    <video id="v" autoplay playsinline></video>
    <button id="pip-btn" title="Open Picture-in-Picture">
        <svg viewBox="0 0 24 24">
            <path
                d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z" />
        </svg>
    </button>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
            });
        }

        const video = document.getElementById('v');
        const pipBtn = document.getElementById('pip-btn');
        const container = document.getElementById('c');

        async function s() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' }
                });
                video.srcObject = stream;
            } catch (e) {
                console.error(e);
            }
        }
        s();

        // Document PiP Logic
        if (!('documentPictureInPicture' in window)) {
            pipBtn.style.display = 'none';
        }

        pipBtn.addEventListener('click', async () => {
            try {
                // Open a PiP window.
                const pipWindow = await window.documentPictureInPicture.requestWindow({
                    width: video.clientWidth,
                    height: video.clientHeight,
                });

                // Copy styles to PiP window
                const style = document.createElement('style');
                style.textContent = `
                    body { margin: 0; background: #000; overflow: hidden; }
                    video { width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
                `;
                pipWindow.document.head.appendChild(style);

                // Move video to PiP window
                pipWindow.document.body.append(video);

                // Handle PiP window closing
                pipWindow.addEventListener('pagehide', (event) => {
                    container.prepend(video);
                });
            } catch (e) {
                console.error('PiP failed:', e);
            }
        });
    </script>
</body>

</html>
